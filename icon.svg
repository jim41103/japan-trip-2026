<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- 經典富士山風景照的黃昏漸層天空：深藍→紫紅→橘金，最美的那種角度 -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1a2c52"/>
      <stop offset="35%" stop-color="#5c3f6e"/>
      <stop offset="62%" stop-color="#c96a5a"/>
      <stop offset="82%" stop-color="#f0a856"/>
      <stop offset="100%" stop-color="#ffd68a"/>
    </linearGradient>
    <!-- 山體：逆光剪影帶一點紫藍層次，不是死黑 -->
    <linearGradient id="mtn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#3a3560"/>
      <stop offset="100%" stop-color="#241f3d"/>
    </linearGradient>
    <linearGradient id="mtnFar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#6b5a7a"/>
      <stop offset="100%" stop-color="#4a3f5e"/>
    </linearGradient>
    <!-- 雪頂：夕陽映照，不是純白，帶點暖粉 -->
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#fff6e8"/>
      <stop offset="100%" stop-color="#ffcfa3"/>
    </linearGradient>
    <linearGradient id="lake" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#c96a5a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#2a2348" stop-opacity="0.85"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#fff3d6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#fff3d6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#sky)"/>

  <!-- 太陽光暈，貼著富士山肩膀，最美風景照常見的構圖 -->
  <circle cx="256" cy="230" r="150" fill="url(#sun)"/>

  <!-- 遠山（右側次峰，增加景深層次） -->
  <path d="M300 300 L392 152 L474 300 Z" fill="url(#mtnFar)" opacity="0.75"/>

  <!-- 富士山主體：經典對稱錐形剪影 -->
  <path d="M256 96 L392 316 L120 316 Z" fill="url(#mtn)"/>

  <!-- 雪頂：左右對稱的鋸齒雪線，富士山標誌性的雪帽輪廓 -->
  <path d="M256 96 L314 190 L295 165 L283 195 L268 170 L256 200 L244 170 L229 195 L217 165 L198 190 Z" fill="url(#snow)"/>

  <!-- 湖面倒影，呼應「最美風景照」常見的鏡面構圖 -->
  <path d="M0 340 L512 340 L512 512 L0 512 Z" fill="url(#lake)"/>
  <path d="M256 340 L392 452 L120 452 Z" fill="#241f3d" opacity="0.4"/>
  <path d="M256 340 L314 246 L295 271 L283 241 L268 266 L256 236 L244 266 L229 241 L217 271 L198 246 Z" fill="#ffcfa3" opacity="0.35"/>

  <!-- 雲霧，柔化山腳與湖面交界 -->
  <ellipse cx="256" cy="322" rx="230" ry="16" fill="#fff6e8" opacity="0.25"/>
  <ellipse cx="180" cy="332" rx="90" ry="10" fill="#fff6e8" opacity="0.2"/>
  <ellipse cx="350" cy="330" rx="110" ry="11" fill="#fff6e8" opacity="0.2"/>
</svg>
