<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#c62828"/>
  <!-- 鳥居頂部飾柱 -->
  <rect x="236" y="60" width="40" height="52" rx="8" fill="white" opacity="0.92"/>
  <!-- 笠木（弧形頂橫木） -->
  <path d="M60 178 Q256 108 452 178" stroke="white" stroke-width="32" fill="none" stroke-linecap="round"/>
  <!-- 島木（直橫木） -->
  <rect x="72" y="196" width="368" height="28" rx="7" fill="white" opacity="0.95"/>
  <!-- 貫（中間橫木） -->
  <rect x="116" y="268" width="280" height="20" rx="6" fill="white" opacity="0.82"/>
  <!-- 左柱 -->
  <rect x="118" y="224" width="34" height="210" rx="10" fill="white" opacity="0.95"/>
  <!-- 右柱 -->
  <rect x="360" y="224" width="34" height="210" rx="10" fill="white" opacity="0.95"/>
  <!-- App 名稱 -->
  <text x="256" y="490" text-anchor="middle" font-size="54"
    font-family="'Hiragino Sans','Noto Sans CJK TC','Microsoft JhengHei',sans-serif"
    fill="white" font-weight="700" letter-spacing="3">東京行程</text>
</svg>
